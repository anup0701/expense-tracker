services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: expense-tracker-db-prod
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expense_tracker}
      MYSQL_USER: ${MYSQL_USER:-expense_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-expense123}
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - expense-tracker-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: ${DOCKERHUB_USERNAME:-local}/expense-tracker-backend:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: expense-tracker-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      DB_NAME: ${MYSQL_DATABASE:-expense_tracker}
      DB_PORT: 3306
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - expense-tracker-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (served by nginx)
  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/expense-tracker-frontend:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: expense-tracker-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - expense-tracker-network

networks:
  expense-tracker-network:
    driver: bridge

volumes:
  mysql_data_prod:
